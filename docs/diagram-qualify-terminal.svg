<svg viewBox="0 0 980 540" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowAmber" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e8a33d" />
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff5a4e" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#16181c" />

  <text x="490" y="30" font-family="Menlo, monospace" font-size="16" font-weight="bold" fill="#c9ced6" text-anchor="middle" letter-spacing="1">QUALIFYING A NEW TERMINAL</text>
  <text x="490" y="50" font-family="Menlo, monospace" font-size="11" fill="#7d848e" text-anchor="middle">a failed qualification cannot damage anything - every stage refuses before typing into a real session</text>

  <!-- Step 1 -->
  <rect x="30" y="75" width="540" height="36" rx="10" fill="#1c1e22" stroke="#0a0b0d" stroke-width="1" />
  <text x="300" y="97" font-family="Menlo, monospace" font-size="12" fill="#c9ced6" text-anchor="middle">1. Add bundle id to ~/.stickshift/config.toml (<tspan fill="#7d848e">enabled_terminals = [...]</tspan>)</text>

  <!-- Arrow 1 -->
  <line x1="300" y1="111" x2="300" y2="133" stroke="#e8a33d" stroke-width="2" marker-end="url(#arrowAmber)" />

  <!-- Step 2 -->
  <rect x="30" y="135" width="540" height="36" rx="10" fill="#1c1e22" stroke="#0a0b0d" stroke-width="1" />
  <text x="300" y="157" font-family="Menlo, monospace" font-size="12" fill="#c9ced6" text-anchor="middle">2. <tspan font-weight="bold" fill="#ffffff">shift status</tspan> with an agent pane focused</text>

  <!-- Arrow 2 (Into Decision 2) -->
  <line x1="300" y1="171" x2="300" y2="183" stroke="#e8a33d" stroke-width="2" marker-end="url(#arrowAmber)" />

  <!-- Decision 2 -->
  <polygon points="300,185 440,207 300,229 160,207" fill="#1c1e22" stroke="#0a0b0d" stroke-width="1" />
  <text x="300" y="211" font-family="Menlo, monospace" font-size="12" fill="#c9ced6" text-anchor="middle">prints agent/model/effort?</text>

  <!-- D2 NO Path -->
  <line x1="440" y1="207" x2="518" y2="207" stroke="#ff5a4e" stroke-width="2" marker-end="url(#arrowRed)" />
  <text x="479" y="202" font-family="Menlo, monospace" font-size="10" font-weight="bold" fill="#ff5a4e" text-anchor="middle">NO</text>

  <!-- Right Plate 2 -->
  <rect x="520" y="183" width="430" height="48" rx="10" fill="#2d1b1d" stroke="#ff5a4e" stroke-width="1" />
  <text x="735" y="201" font-family="Menlo, monospace" font-size="12" fill="#c9ced6" text-anchor="middle">terminal does not expose text via</text>
  <text x="735" y="217" font-family="Menlo, monospace" font-size="12" fill="#c9ced6" text-anchor="middle">Accessibility - <tspan fill="#ff5a4e" font-weight="bold">STOP</tspan>, needs OCR fallback</text>

  <!-- D2 YES Path -->
  <line x1="300" y1="229" x2="300" y2="251" stroke="#e8a33d" stroke-width="2" marker-end="url(#arrowAmber)" />
  <text x="316" y="244" font-family="Menlo, monospace" font-size="10" font-weight="bold" fill="#e8a33d" text-anchor="start">YES</text>

  <!-- Step 3 -->
  <rect x="30" y="253" width="540" height="36" rx="10" fill="#1c1e22" stroke="#0a0b0d" stroke-width="1" />
  <text x="300" y="275" font-family="Menlo, monospace" font-size="12" fill="#c9ced6" text-anchor="middle">3. <tspan font-weight="bold" fill="#ffffff">shift 4</tspan> (dry run)</text>

  <!-- Arrow 3 (Into Decision 3) -->
  <line x1="300" y1="289" x2="300" y2="301" stroke="#e8a33d" stroke-width="2" marker-end="url(#arrowAmber)" />

  <!-- Decision 3 -->
  <polygon points="300,303 440,325 300,347 160,325" fill="#1c1e22" stroke="#0a0b0d" stroke-width="1" />
  <text x="300" y="329" font-family="Menlo, monospace" font-size="12" fill="#c9ced6" text-anchor="middle">all prechecks pass?</text>

  <!-- D3 NO Path -->
  <line x1="440" y1="325" x2="518" y2="325" stroke="#ff5a4e" stroke-width="2" marker-end="url(#arrowRed)" />
  <text x="479" y="320" font-family="Menlo, monospace" font-size="10" font-weight="bold" fill="#ff5a4e" text-anchor="middle">NO</text>

  <!-- Right Plate 3 -->
  <rect x="520" y="307" width="430" height="36" rx="10" fill="#2d1b1d" stroke="#ff5a4e" stroke-width="1" />
  <text x="735" y="329" font-family="Menlo, monospace" font-size="12" fill="#c9ced6" text-anchor="middle">read the reason code, fix, retry (README table)</text>

  <!-- D3 YES Path -->
  <line x1="300" y1="347" x2="300" y2="369" stroke="#e8a33d" stroke-width="2" marker-end="url(#arrowAmber)" />
  <text x="316" y="362" font-family="Menlo, monospace" font-size="10" font-weight="bold" fill="#e8a33d" text-anchor="start">YES</text>

  <!-- Step 4 -->
  <rect x="30" y="371" width="540" height="36" rx="10" fill="#1c1e22" stroke="#0a0b0d" stroke-width="1" />
  <text x="300" y="393" font-family="Menlo, monospace" font-size="12" fill="#c9ced6" text-anchor="middle">4. <tspan font-weight="bold" fill="#ffffff">shift 4 --commit</tspan> against a THROWAWAY agent session</text>

  <!-- Arrow 4 (Into Decision 4) -->
  <line x1="300" y1="407" x2="300" y2="419" stroke="#e8a33d" stroke-width="2" marker-end="url(#arrowAmber)" />

  <!-- Decision 4 -->
  <polygon points="300,421 480,448 300,475 120,448" fill="#1c1e22" stroke="#0a0b0d" stroke-width="1" />
  <text x="300" y="443" font-family="Menlo, monospace" font-size="12" fill="#c9ced6" text-anchor="middle">pane switched +</text>
  <text x="300" y="459" font-family="Menlo, monospace" font-size="12" fill="#c9ced6" text-anchor="middle">settings.json mtime moved?</text>

  <!-- D4 NO Path -->
  <line x1="480" y1="448" x2="518" y2="448" stroke="#ff5a4e" stroke-width="2" marker-end="url(#arrowRed)" />
  <text x="499" y="443" font-family="Menlo, monospace" font-size="10" font-weight="bold" fill="#ff5a4e" text-anchor="middle">NO</text>

  <!-- Right Plate 4 -->
  <rect x="520" y="424" width="430" height="48" rx="10" fill="#2d1b1d" stroke="#ff5a4e" stroke-width="1" />
  <text x="735" y="442" font-family="Menlo, monospace" font-size="12" fill="#c9ced6" text-anchor="middle">INJECT_DROPPED = terminal drops synthetic</text>
  <text x="735" y="458" font-family="Menlo, monospace" font-size="12" fill="#c9ced6" text-anchor="middle">keystrokes - <tspan fill="#ff5a4e" font-weight="bold">STOP</tspan>, not drivable</text>

  <!-- D4 YES Path -->
  <line x1="300" y1="475" x2="300" y2="493" stroke="#e8a33d" stroke-width="2" marker-end="url(#arrowAmber)" />
  <text x="316" y="488" font-family="Menlo, monospace" font-size="10" font-weight="bold" fill="#e8a33d" text-anchor="start">YES</text>

  <!-- Success Plate -->
  <rect x="30" y="495" width="540" height="36" rx="10" fill="#1b2920" stroke="#5fd47a" stroke-width="1" />
  <text x="300" y="517" font-family="Menlo, monospace" font-size="12" fill="#c9ced6" text-anchor="middle"><tspan fill="#5fd47a" font-weight="bold">QUALIFIED</tspan> - use it, consider a PR to the supported table</text>

</svg>